name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # release-please creates releases and pushes release PRs
      pull-requests: write # release-please opens and updates release PRs
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  upload-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write # upload release zip and edit release notes
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Create integration zip
        run: |
          VERSION="${NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION}"
          echo "Creating zip for version ${VERSION}"

          # Create zip from inside the integration directory
          cd "${{ github.workspace }}/custom_components/meraki_dashboard"
          zip -r "meraki_dashboard.zip" ./ -x "*.pyc" "*/__pycache__/*" "*/.DS_Store"

          # Move zip back to workspace
          mv "meraki_dashboard.zip" "${GITHUB_WORKSPACE}/"
        env:
          NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION: ${{ needs.release-please.outputs.version }}

      - name: Upload zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION: ${{ needs.release-please.outputs.version }}
          NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION}"
          TAG_NAME="${NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME}"
          ZIP_FILE="meraki_dashboard.zip"

          echo "Uploading ${ZIP_FILE} to release ${TAG_NAME}"

          gh release upload "${TAG_NAME}" "${ZIP_FILE}" --clobber

      - name: Comment on release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          TAG_NAME="${NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME}"
          VERSION="${NEEDS_RELEASE_PLEASE_OUTPUTS_VERSION}"

          gh release view "${TAG_NAME}" --json body -q '.body' > release_body.txt

          cat >> release_body.txt <<EOF

          ---

          ## Installation

          Download \`meraki_dashboard.zip\` and extract to your Home Assistant \`custom_components\` directory.

          Or use HACS to install this integration.
          EOF

          gh release edit "${TAG_NAME}" --notes-file release_body.txt
